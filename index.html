<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Margem</title>

<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

<h1>Calculadora de Margem</h1>

<div class="card">

<label>Valor de Custo</label>
<input id="custo" type="number" step="0.01">

<label>Valor de Venda</label>
<input id="venda" type="number" step="0.01">

<label>Forma de Pagamento</label>

<select id="parcela">

<option value="0.00822">Débito</option>
<option value="0.03195">1x</option>
<option value="0.04278">2x</option>
<option value="0.04994">3x</option>
<option value="0.05660">4x</option>
<option value="0.06328">5x</option>
<option value="0.07012">6x</option>
<option value="0.07882">7x</option>
<option value="0.08546">8x</option>
<option value="0.09223">9x</option>
<option value="0.09866">10x</option>
<option value="0.10493">11x</option>
<option value="0.11137">12x</option>
<option value="0.11773">13x</option>
<option value="0.12341">14x</option>
<option value="0.13013">15x</option>
<option value="0.13624">16x</option>
<option value="0.14188">17x</option>
<option value="0.14778">18x</option>
<option value="0.15330">19x</option>
<option value="0.15921">20x</option>

</select>

<button onclick="calcular()">
Calcular
</button>

</div>

<div class="resultado">

<div>

<h3>Taxa</h3>

<p id="taxa"></p>

</div>

<div>

<h3>Valor Recebido</h3>

<p id="recebe"></p>

</div>

<div>

<h3>Lucro</h3>

<p id="lucro"></p>

</div>

<div>

<h3>Margem</h3>

<p id="margem"></p>

</div>

</div>

</div>

<script src="/script.js"></script>

</body>
</html>
